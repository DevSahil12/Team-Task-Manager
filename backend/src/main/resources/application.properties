# ─── Server ───────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Database ─────────────────────────────────────────────
# Production (Railway PostgreSQL) — set DATABASE_URL env var
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JWT ──────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:TaskFlowSuperSecretKeyForJWTSigning2024MustBe256BitsLong!!}
app.jwt.expiration-ms=86400000

# ─── CORS ─────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# ─── Logging ──────────────────────────────────────────────
logging.level.com.taskmanager=DEBUG
